# Qwen3-32B PD 分离：1 Prefill (TP=2, 卡 0-1) + 2 Decode (TP=2, 卡 2-5)，共 6 卡
cluster_name: "Qwen3-32B_1P2_2D2"

model:
  path: "/root/autodl-tmp/models/Qwen3-32B"
  served_name: "qwen3_32b"

venv:
  vllm: "/root/autodl-tmp/py_venv/vllm2"

log_dir: "logs"   # 日志输出目录；CLI --log_dir 可覆盖

paths:
  transfer_engine_lib: "/usr/local/lib"
  python_lib: "/root/.local/share/uv/python/cpython-3.11.15-linux-aarch64-gnu/lib"
  code_root: "/root/autodl-tmp/code"
  proxy_script: "vllm-ascend/examples/disaggregated_prefill_v1/load_balance_proxy_server_example.py"

# null = 自动探测；显式指定则覆盖
network:
  nic_name: null
  local_ip: null

# vLLM serve 默认参数，所有实例共享；实例级 overrides 可覆盖任意项
vllm_defaults:
  dtype: "bfloat16"
  max_model_len: 32768
  max_num_batched_tokens: 32768
  max_num_seqs: 256
  gpu_memory_utilization: 0.9
  enforce_eager: true
  trust_remote_code: true
  enable_auto_tool_choice: true
  tool_call_parser: "hermes"
  seed: 1024
  omp_num_threads: 10

# KV cache transfer connector 共享配置
kv_connector:
  type: "MooncakeConnectorV1"
  buffer_device: "npu"
  module_path: "vllm_ascend.distributed.mooncake_connector"

# Prefill 实例列表（dp_size / dp_rank 自动计算）
prefill:
  - name: "P0"
    port: 9000
    devices: "0,1"
    tensor_parallel_size: 2
    dp_port: 13395
    kv_port: 20001
    engine_id: 0
    hccl_buffsize: 256

# Decode 实例列表（dp_size / dp_rank 自动计算）
decode:
  - name: "D0"
    port: 9010
    devices: "2,3"
    tensor_parallel_size: 2
    dp_port: 13495
    kv_port: 20002
    engine_id: 1
    hccl_buffsize: 1024

  - name: "D1"
    port: 9011
    devices: "4,5"
    tensor_parallel_size: 2
    dp_port: 13495
    kv_port: 20002
    engine_id: 1
    hccl_buffsize: 1024

# 负载均衡代理；设为 null 或删除此段则不启代理
proxy:
  port: 8000
